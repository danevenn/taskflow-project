<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskflow Project</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-100 font-sans min-h-screen flex flex-col transition-colors duration-200">
    <header class="bg-blue-600 dark:bg-blue-800 text-white p-4 flex justify-between items-center shadow-md">
        <h1 class="text-2xl font-bold">Taskflow Project</h1>
        <button id="themeToggle" class="p-2 bg-blue-700 dark:bg-slate-700 hover:bg-blue-800 dark:hover:bg-slate-600 rounded-lg transition-colors focus:ring-2 focus:ring-white" aria-label="Toggle Dark Mode">
            <svg id="themeIconDark" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
            <svg id="themeIconLight" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
        </button>
    </header>

    <div class="flex-1 flex flex-col md:flex-row w-full max-w-7xl mx-auto">
        <main class="flex-1 p-4 md:p-8 space-y-8">
            <section class="bg-white dark:bg-slate-800 p-6 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700">
                <h2 class="text-xl font-bold mb-2">Objetivo</h2>
                <p class="text-slate-600 dark:text-slate-300">Página web disponibilizada para la gestión de proyectos y tareas</p>
            </section>

            <section class="bg-white dark:bg-slate-800 p-6 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700">
                <h2 class="text-xl font-bold mb-4">Novedades</h2>
                <article>
                    <h3 class="text-lg font-semibold mb-2">Últimas tareas añadidas</h3>
                    <p class="text-slate-600 dark:text-slate-400 mb-4">Se han añadido <strong id="recentTasksCount" class="text-blue-600 dark:text-blue-400">0</strong> nuevas tareas en los últimos 3 días</p>
                    <ul class="space-y-3" id="recentTasksList">
                        <!-- Las 3 últimas tareas se cargarán aquí -->
                    </ul>
                    <details id="moreRecentTasksContainer" class="mt-4 hidden group">
                        <summary class="cursor-pointer text-blue-600 dark:text-blue-400 font-semibold hover:text-blue-800 dark:hover:text-blue-300 transition-colors list-none flex items-center gap-2">
                            <span>Ver más tareas recientes</span>
                            <svg class="w-4 h-4 transition-transform group-open:rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </summary>
                        <ul class="space-y-3 mt-3" id="moreRecentTasksList">
                            <!-- Resto de tareas recientes -->
                        </ul>
                    </details>
                </article>
            </section>

            <section class="bg-white dark:bg-slate-800 p-6 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700">
                <h2 class="text-xl font-bold mb-4">Lista de Tareas</h2>

                <form id="taskForm" class="flex flex-wrap gap-4 mb-8 items-end">
                    <div class="flex-1 min-w-[200px]">
                        <label for="newTaskTitle" class="block text-sm font-medium mb-1 text-slate-700 dark:text-slate-300">Título de la tarea</label>
                        <input type="text" id="newTaskTitle" placeholder="Ej: Revisar documentación" required class="w-full px-4 py-2 bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all placeholder-slate-400 text-base">
                    </div>
                    <div class="w-full sm:w-auto min-w-[150px]">
                        <label for="newTaskCategory" class="block text-sm font-medium mb-1 text-slate-700 dark:text-slate-300">Categoría</label>
                        <select id="newTaskCategory" required class="w-full px-4 py-2 pr-12 bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all cursor-pointer text-base">
                            <option value="Trabajo">Trabajo</option>
                            <option value="Formación">Formación</option>
                            <option value="Equipo">Equipo</option>
                        </select>
                    </div>
                    <div class="w-full sm:w-auto min-w-[150px]">
                        <label for="newTaskPriority" class="block text-sm font-medium mb-1 text-slate-700 dark:text-slate-300">Prioridad</label>
                        <select id="newTaskPriority" required class="w-full px-4 py-2 pr-12 bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all cursor-pointer text-base">
                            <option value="Alta">Alta</option>
                            <option value="Media">Media</option>
                            <option value="Baja">Baja</option>
                        </select>
                    </div>
                    <button type="submit" class="w-full sm:w-auto px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg shadow-sm transition-colors focus:ring-2 focus:ring-blue-500 focus:ring-offset-1 dark:focus:ring-offset-slate-800">
                        Añadir Tarea
                    </button>
                </form>

                <ul class="space-y-3" id="taskList">
                    <!-- Las tareas se cargarán aquí dinámicamente -->
                </ul>
            </section>
        </main>

        <aside class="w-full md:w-80 bg-slate-100 dark:bg-slate-800/50 p-6 md:m-8 md:ml-0 md:rounded-xl border-y md:border border-slate-200 dark:border-slate-700 flex flex-col gap-8 md:h-fit sticky top-8">
            <div>
                <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
                    <svg class="w-5 h-5 text-blue-600 dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"></path></svg>
                    Filtros y Búsqueda
                </h3>

                <div class="mb-6">
                    <label for="searchInput" class="block text-sm font-medium mb-2 text-slate-700 dark:text-slate-300">Buscar tarea:</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        </div>
                        <input type="text" id="searchInput" placeholder="Escribe para buscar..." class="w-full pl-10 pr-4 py-2 bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder-slate-400 text-base" />
                    </div>
                </div>

                <div>
                    <p class="block text-sm font-medium mb-3 text-slate-700 dark:text-slate-300">Categorías:</p>
                    <ul class="flex flex-col gap-2" id="categoryFilters">
                        <li><button class="filter-btn active w-full text-left px-4 py-2 rounded-lg border border-transparent hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors ui-active:bg-blue-600 ui-active:text-white ui-active:hover:bg-blue-700 dark:ui-active:bg-blue-600 font-medium" data-category="Todas">Todas</button></li>
                        <li><button class="filter-btn w-full text-left px-4 py-2 rounded-lg border border-slate-200 dark:border-slate-700 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors font-medium text-slate-700 dark:text-slate-300" data-category="Trabajo">Trabajo</button></li>
                        <li><button class="filter-btn w-full text-left px-4 py-2 rounded-lg border border-slate-200 dark:border-slate-700 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors font-medium text-slate-700 dark:text-slate-300" data-category="Formación">Formación</button></li>
                        <li><button class="filter-btn w-full text-left px-4 py-2 rounded-lg border border-slate-200 dark:border-slate-700 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors font-medium text-slate-700 dark:text-slate-300" data-category="Equipo">Equipo</button></li>
                    </ul>
                </div>
                <div class="mt-4">
                    <p class="block text-sm font-medium mb-3 text-slate-700 dark:text-slate-300">Estados:</p>
                    <ul class="flex flex-col gap-2" id="statusFilters">
                        <li><button class="status-btn active w-full text-left px-4 py-2 rounded-lg border border-transparent hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors ui-active:bg-blue-600 ui-active:text-white ui-active:hover:bg-blue-700 dark:ui-active:bg-blue-600 font-medium" data-status="Todos">Todos</button></li>
                        <li><button class="status-btn w-full text-left px-4 py-2 rounded-lg border border-slate-200 dark:border-slate-700 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors font-medium text-slate-700 dark:text-slate-300" data-status="Pendientes">Pendientes</button></li>
                        <li><button class="status-btn w-full text-left px-4 py-2 rounded-lg border border-slate-200 dark:border-slate-700 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors font-medium text-slate-700 dark:text-slate-300" data-status="Completadas">Completadas</button></li>
                    </ul>
                </div>
                
                <div class="mt-4 pt-6 border-t border-slate-200 dark:border-slate-700 space-y-3">
                    <button id="completeAllTasksBtn" class="w-full flex items-center justify-center gap-2 px-4 py-2 bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-200 rounded-lg transition-colors font-medium focus:ring-2 focus:ring-blue-500 outline-none">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                        Marcar todas como completadas
                    </button>
                    <button id="clearCompletedBtn" class="w-full flex items-center justify-center gap-2 px-4 py-2 border border-slate-300 dark:border-slate-600 text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700/50 rounded-lg transition-colors font-medium focus:ring-2 focus:ring-blue-500 outline-none">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        Borrar completadas
                    </button>
                    <button id="clearAllTasksBtn" class="w-full flex items-center justify-center gap-2 px-4 py-2 border border-red-500 text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg transition-colors font-medium focus:ring-2 focus:ring-red-500 outline-none">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        Borrar todas las tareas
                    </button>
                </div>
            </div>
        </aside>
    </div>

    <script src="app.js"></script>
</body>

</html>
